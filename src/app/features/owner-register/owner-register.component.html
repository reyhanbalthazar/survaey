<section class="register-page">
  <div class="card">
    <h1>Owner Register</h1>
    <p>Create a new account to manage surveys.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label for="name">Name</label>
      <input id="name" type="text" formControlName="name" placeholder="Owner Name" />

      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="owner@email.com" />

      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" placeholder="minimum 8 characters" />

      <label for="password_confirmation">Confirm Password</label>
      <input
        id="password_confirmation"
        type="password"
        formControlName="password_confirmation"
        placeholder="repeat your password"
      />

      @if (passwordMismatch) {
        <p class="error">Password and confirmation password must match.</p>
      }

      <button type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Creating account...' : 'Register' }}
      </button>
    </form>

    <small>Already have an account? <a routerLink="/owner/login">Login</a></small>
  </div>
</section>
