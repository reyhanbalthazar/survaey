<section class="login-page">
  <div class="card">
    <h1>Owner Login</h1>
    <p>Sign in to manage surveys, coin balance, and responses.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="owner@email.com" />

      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" placeholder="********" />

      <button type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <small>Don't have an account? <a routerLink="/owner/register">Register</a></small>
  </div>
</section>
